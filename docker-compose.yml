version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# MobileScraper — Celery worker
#
# Prerequisites
# -------------
# 1. Copy .env.example to .env and fill in CLOUDAMQP_URL and DATABASE_URL.
# 2. Connect Android device(s) via USB.
# 3. Run:  docker compose up --build
#
# Scaling
# -------
# To run N parallel workers (one per device):
#   docker compose up --build --scale worker=N
#
# Or set CELERY_CONCURRENCY=N in .env to use multiple threads inside one
# container (useful when all devices are on the same machine).
# ─────────────────────────────────────────────────────────────────────────────

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile

    # Load all env vars from .env
    env_file:
      - .env

    # ── ADB device access ─────────────────────────────────────────────────────
    # The container's `adb` client connects to the ADB server running on the
    # HOST over TCP (port 5037).  This avoids USB passthrough entirely.
    #
    # On the host, before starting the container:
    #   adb start-server          # starts the server (already running if you ran adb devices)
    #   adb -a -P 5037 nodaemon & # optional: explicitly bind to all interfaces
    #
    # host-gateway resolves to the Docker host IP automatically (Linux + Docker 20.10+).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-1}
      CELERY_WORKER_NAME: ${CELERY_WORKER_NAME:-mobilescraper}
      # Tell adb client inside the container to use the host's adb server
      ANDROID_ADB_SERVER_HOST: host.docker.internal
      ANDROID_ADB_SERVER_PORT: "5037"
    volumes:
      # Persist device lock files across restarts
      - mobilescraper_locks:/tmp/mobilescraper_locks

    # Keep the container running even if the worker exits (e.g. after a
    # device disconnect); restart manually after investigating the logs.
    restart: "unless-stopped"

    # Readable container name
    container_name: mobilescraper_worker

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mobilescraper_locks:
